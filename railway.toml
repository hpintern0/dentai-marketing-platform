[build]
builder = "nixpacks"

[build.nixpacks]
aptPkgs = ["chromium", "ffmpeg", "fonts-liberation", "libnss3", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"]

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
