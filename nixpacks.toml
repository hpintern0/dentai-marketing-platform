[phases.setup]
aptPkgs = ["chromium", "ffmpeg", "fonts-liberation", "libnss3", "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/usr/bin"
CHROMIUM_PATH = "/usr/bin/chromium"
